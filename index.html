<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>专属你的 GV 视界 · 引导</title>
<style>
  :root {
    --bg: #0e1014;
    --accent: #ff7a45;
    --accent2: #ffb347;
    --text: #f5f6f8;
    --muted: #9aa0ad;
    --card: rgba(255, 255, 255, .06);
    --border: rgba(255, 255, 255, .12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(1200px 620px at 50% -8%, #1c2230 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

  /* ===== Hero ===== */
  .hero { text-align: center; padding: 64px 0 32px; }
  .eyebrow {
    display: inline-block;
    font-size: 13px; letter-spacing: 2px;
    color: var(--accent2);
    border: 1px solid var(--border);
    padding: 4px 14px; border-radius: 999px;
    margin-bottom: 18px; background: var(--card);
  }
  .hero h1 {
    font-size: clamp(28px, 5vw, 46px); font-weight: 800; line-height: 1.2;
    background: linear-gradient(90deg, #fff, var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 14px;
  }
  .hero p.lead {
    color: var(--muted); max-width: 640px; margin: 0 auto 28px; font-size: 16px;
  }

  /* ===== 顶部 banner 图片占位 ===== */
  .banner-ph {
    width: 100%; aspect-ratio: 21 / 9; border-radius: 18px;
    border: 1px dashed var(--border);
    background:
      linear-gradient(135deg, rgba(255,122,69,.12), rgba(255,179,71,.06)),
      repeating-linear-gradient(45deg, #171b24 0 14px, #141821 14px 28px);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; margin-bottom: 14px; overflow: hidden;
  }
  .banner-ph img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .banner-ph .tag { background: rgba(0,0,0,.35); padding: 6px 12px; border-radius: 8px; }

  /* ===== 肌肉照占位 ===== */
  .muscles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 26px 0 8px; }
  .muscle-card {
    aspect-ratio: 1 / 1.15; border-radius: 16px; border: 1px solid var(--border);
    background: linear-gradient(160deg, #222838, #151921);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--muted); position: relative; overflow: hidden;
  }
  .muscle-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .muscle-card .emoji { font-size: 40px; opacity: .5; margin-bottom: 8px; }
  .muscle-card .cap { font-size: 12px; }
  .muscle-card::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 40%, rgba(255,179,71,.10) 100%);
    pointer-events: none;
  }

  /* ===== 文案占位块 ===== */
  .copy {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px 24px; margin: 30px 0; font-size: 15px; color: #d7dbe2;
  }
  .copy .ph-label { color: var(--accent2); font-weight: 700; margin-right: 6px; }

  /* ===== CTA 按钮 ===== */
  .cta { display: flex; flex-direction: column; gap: 14px; max-width: 520px; margin: 12px auto 60px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px 22px; border-radius: 14px; font-size: 17px; font-weight: 700;
    text-decoration: none; color: #1a1205; cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    border: none;
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 10px 30px rgba(255,122,69,.35);
  }
  .btn-ghost { background: rgba(255,255,255,.10); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,.16); }
  .btn .arrow { font-size: 18px; }

  footer { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0 40px; }

  @media (max-width: 640px) {
    .hero { padding: 44px 0 24px; }
    .muscles { gap: 8px; }
    .muscle-card .emoji { font-size: 28px; }
    .muscle-card .cap { font-size: 11px; }
  }
</style>
</head>

</html>
